{% extends 'base.html' %}
{% load static %}

{% block title %}{{ action }} — Ресторан «Берёза»{% endblock %}

{% block content %}
<ul class="uk-breadcrumb uk-margin-small-bottom">
    <li><a href="{% url 'reservation_list' %}">Брони</a></li>
    <li><span>{{ action }}</span></li>
</ul>

<h2 class="uk-heading-line uk-margin-medium-bottom"><span>{{ action }}</span></h2>

<div class="uk-card uk-card-default uk-card-body uk-box-shadow-small uk-width-3-4@m">
    {% if error %}<div class="uk-alert-danger" uk-alert><span uk-icon="icon: warning; ratio: 0.9" class="uk-margin-small-right"></span>{{ error }}</div>{% endif %}
    <form method="post" class="uk-form-stacked">
        {% csrf_token %}
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
            <div><div class="uk-margin"><label class="uk-form-label">Столик <span class="uk-text-danger">*</span></label><select class="uk-select" name="table" required><option value="">— Выберите столик —</option>{% for t in tables %}<option value="{{ t.pk }}" {% if reservation and reservation.table_id == t.pk %}selected{% endif %}>Столик №{{ t.number }} ({{ t.capacity }} мест)</option>{% endfor %}</select></div></div>
            <div><div class="uk-margin"><label class="uk-form-label">Статус <span class="uk-text-danger">*</span></label><select class="uk-select" name="status" required><option value="">— Выберите статус —</option>{% for s in statuses %}<option value="{{ s.pk }}" {% if reservation and reservation.status_id == s.pk %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select></div></div>
        </div>
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
            <div><div class="uk-margin"><label class="uk-form-label">Имя гостя <span class="uk-text-danger">*</span></label><div class="uk-inline uk-width-1-1"><span class="uk-form-icon" uk-icon="icon: user"></span><input class="uk-input" type="text" name="guest_name" value="{{ reservation.guest_name|default:'' }}" required></div></div></div>
            <div><div class="uk-margin"><label class="uk-form-label">Телефон <span class="uk-text-danger">*</span></label><div class="uk-inline uk-width-1-1"><span class="uk-form-icon" uk-icon="icon: receiver"></span><input class="uk-input" type="text" name="guest_phone" placeholder="+7 (000) 000-00-00" value="{{ reservation.guest_phone|default:'' }}" required></div></div></div>
        </div>
        <div class="uk-margin"><label class="uk-form-label">Email</label><div class="uk-form-controls uk-width-1-2@s"><div class="uk-inline uk-width-1-1"><span class="uk-form-icon" uk-icon="icon: mail"></span><input class="uk-input" type="email" name="guest_email" value="{{ reservation.guest_email|default:'' }}"></div></div></div>
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
            <div><div class="uk-margin"><label class="uk-form-label">Дата <span class="uk-text-danger">*</span></label><input class="uk-input" type="date" name="date" value="{{ reservation.date|date:'Y-m-d'|default:'' }}" required></div></div>
            <div><div class="uk-margin"><label class="uk-form-label">Количество гостей <span class="uk-text-danger">*</span></label><input class="uk-input" type="number" name="guests_count" min="1" value="{{ reservation.guests_count|default:'' }}" required></div></div>
        </div>
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
            <div><div class="uk-margin"><label class="uk-form-label">Время начала <span class="uk-text-danger">*</span></label><input class="uk-input" type="time" name="start_time" value="{{ reservation.start_time|time:'H:i'|default:'' }}" required></div></div>
            <div><div class="uk-margin"><label class="uk-form-label">Время окончания <span class="uk-text-danger">*</span></label><input class="uk-input" type="time" name="end_time" value="{{ reservation.end_time|time:'H:i'|default:'' }}" required></div></div>
        </div>
        <div class="uk-margin"><label class="uk-form-label">Комментарий / пожелания</label><input class="uk-input" type="text" name="comment" value="{{ reservation.comment|default:'' }}" placeholder="Особые пожелания гостя..."></div>
        <div class="uk-margin-medium-top uk-flex" style="gap:12px;"><button type="submit" class="uk-button uk-button-primary"><span uk-icon="icon: check; ratio: 0.9" class="uk-margin-small-right"></span>Сохранить</button><a href="{% url 'reservation_list' %}" class="uk-button uk-button-default">Отмена</a></div>
    </form>
</div>
{% endblock %}
