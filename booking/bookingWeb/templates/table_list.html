{% extends 'base.html' %}
{% block title %}Управление столиками — Ресторан «Берёза»{% endblock %}
{% block content %}
<div class="uk-flex uk-flex-between uk-flex-middle uk-margin-medium-bottom">
    <h2 class="uk-heading-line uk-margin-remove"><span>Управление столиками</span></h2>
    <a href="{% url 'table_add' %}" class="uk-button uk-button-primary uk-button-small"><span uk-icon="icon: plus; ratio: 0.85" class="uk-margin-small-right"></span>Добавить столик</a>
</div>

<form method="get" hx-get="{% url 'table_list' %}" hx-trigger="change" hx-target="#table-container" hx-push-url="true" class="uk-margin-bottom uk-flex uk-flex-middle" style="gap: 10px;">
    <label class="uk-text-bold" for="capacity-filter">Фильтр по вместимости:</label>
    <select id="capacity-filter" name="capacity" class="uk-select uk-width-small">
        <option value="">Все столики</option>
        {% for cap in capacities %}<option value="{{ cap }}" {% if selected_cap == cap|stringformat:"s" %}selected{% endif %}>от {{ cap }} мест</option>{% endfor %}
    </select>
</form>

<div id="table-container">
    {% include "table_list_fragment.html" %}
</div>
{% endblock %}
