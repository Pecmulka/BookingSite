{% extends 'base.html' %}
{% block title %}{{ action }} — Ресторан «Берёза»{% endblock %}
{% block content %}
<ul class="uk-breadcrumb uk-margin-small-bottom">
    <li><a href="{% url 'table_list' %}">Столики</a></li>
    <li><span>{{ action }}</span></li>
</ul>

<h2 class="uk-heading-line uk-margin-medium-bottom"><span>{{ action }}</span></h2>

<!-- ✅ Заменено uk-width-1-2@m на uk-width-1-1 -->
<div class="uk-card uk-card-default uk-card-body uk-box-shadow-small uk-width-1-1">
    {% if error %}<div class="uk-alert-danger" uk-alert><span uk-icon="icon: warning; ratio: 0.9" class="uk-margin-small-right"></span>{{ error }}</div>{% endif %}
    <form method="post" class="uk-form-stacked">
        {% csrf_token %}
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
            <div>
                <div class="uk-margin"><label class="uk-form-label">Номер столика <span class="uk-text-danger">*</span></label><input class="uk-input" type="number" name="number" min="1" value="{{ table.number|default:'' }}" required placeholder="Например: 5"></div>
            </div>
            <div>
                <div class="uk-margin"><label class="uk-form-label">Вместимость (мест) <span class="uk-text-danger">*</span></label><input class="uk-input" type="number" name="capacity" min="1" value="{{ table.capacity|default:'' }}" required placeholder="Например: 4"></div>
            </div>
        </div>
        <div class="uk-margin"><label class="uk-form-label">Описание / расположение</label><input class="uk-input" type="text" name="description" value="{{ table.description|default:'' }}" placeholder="Например: у окна, на веранде..."></div>
        <div class="uk-margin-medium-top uk-flex" style="gap:12px;">
            <button type="submit" class="uk-button uk-button-primary"><span uk-icon="icon: check; ratio: 0.9" class="uk-margin-small-right"></span>Сохранить</button>
            <a href="{% url 'table_list' %}" class="uk-button uk-button-default">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
