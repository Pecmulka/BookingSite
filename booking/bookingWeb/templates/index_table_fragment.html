{% for table in tables %}
<div>
    <div class="uk-card uk-card-default uk-card-body table-card">
        <h3 class="uk-card-title">Столик № {{ table.number }}</h3>
        <p class="uk-text-large">{{ table.capacity }} мест</p>
        <p class="uk-text-muted">{{ table.description|default:"Стандартное место" }}</p>
        <a href="{% url 'book_table' table.pk %}" class="uk-button uk-button-primary uk-width-1-1">Забронировать</a>
    </div>
</div>
{% empty %}
<div class="uk-alert-primary uk-text-center"><p>Столиков не найдено.</p></div>
{% endfor %}
